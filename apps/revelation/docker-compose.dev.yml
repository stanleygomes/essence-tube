services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    container_name: logos-revelation-libsql
    command: ["sqld", "--http-listen-addr", "0.0.0.0:8080", "--db-path", "/var/lib/sqld"]
    ports:
      - "8080:8080"
    volumes:
      - revelation-libsql-data:/var/lib/sqld

volumes:
  revelation-libsql-data:
