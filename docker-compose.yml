services:
  postgres:
    image: postgres:17-alpine
    container_name: logos-auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_api
    volumes:
      - ./.docker/postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - logos-network

networks:
  logos-network:
